<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — IIWM Bangalore</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/iiwm-mark.png" type="image/png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css?v=6">
<link rel="stylesheet" href="css/admin.css?v=2">
</head>
<body class="admin-body">

<div id="adminGate" class="admin-gate"><p>Checking access…</p></div>

<div id="adminApp" class="admin-app" hidden>
  <header class="admin-header">
    <div class="admin-header-brand">
      <img src="assets/iiwm-mark.png" width="26" height="20" alt="">
      <span>IIWM Admin</span>
    </div>
    <nav class="admin-tabs">
      <button type="button" class="admin-tab is-active" data-tab="leads">Leads</button>
      <button type="button" class="admin-tab" data-tab="visits">Visits</button>
      <button type="button" class="admin-tab" data-tab="blogs">Blogs</button>
    </nav>
    <button type="button" class="admin-logout" id="adminLogout">Log Out</button>
  </header>

  <main class="admin-main">

    <section class="admin-panel is-active" id="panelLeads">
      <div class="admin-stats-row">
        <div class="admin-stat-card">
          <span class="admin-stat-num" id="statQuiz">—</span>
          <span class="admin-stat-label">Quiz Leads</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-num" id="statContact">—</span>
          <span class="admin-stat-label">Contact Enquiries</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-num" id="statBrochure">—</span>
          <span class="admin-stat-label">Brochure Downloads</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-num" id="statPdf">—</span>
          <span class="admin-stat-label">PDF Reports</span>
        </div>
      </div>

      <div class="admin-toolbar">
        <input type="search" id="leadSearch" class="admin-search" placeholder="Search leads by name, phone or email…" aria-label="Search leads">
        <button type="button" class="btn-admin-ghost" id="refreshLeadsBtn">Refresh</button>
      </div>

      <div class="admin-panel-head">
        <h2>Quiz Leads</h2>
        <div class="admin-panel-head-actions">
          <p class="admin-panel-sub" id="quizLeadsCount"></p>
          <button type="button" class="btn-admin-ghost btn-admin-sm" data-export="quiz">Export CSV</button>
        </div>
      </div>
      <div class="admin-table-wrap" id="quizLeadsTableWrap">
        <p class="admin-empty">Loading…</p>
      </div>

      <div class="admin-panel-head" style="margin-top:44px">
        <h2>PDF Downloads</h2>
        <div class="admin-panel-head-actions">
          <p class="admin-panel-sub" id="pdfDownloadsCount"></p>
          <button type="button" class="btn-admin-ghost btn-admin-sm" data-export="pdf">Export CSV</button>
        </div>
      </div>
      <div class="admin-table-wrap" id="pdfDownloadsTableWrap">
        <p class="admin-empty">Loading…</p>
      </div>

      <div class="admin-panel-head" style="margin-top:44px">
        <h2>Brochure Downloads</h2>
        <div class="admin-panel-head-actions">
          <p class="admin-panel-sub" id="brochureLeadsCount"></p>
          <button type="button" class="btn-admin-ghost btn-admin-sm" data-export="brochure">Export CSV</button>
        </div>
      </div>
      <div class="admin-table-wrap" id="brochureLeadsTableWrap">
        <p class="admin-empty">Loading…</p>
      </div>

      <div class="admin-panel-head" style="margin-top:44px">
        <h2>Contact Us Leads</h2>
        <div class="admin-panel-head-actions">
          <p class="admin-panel-sub" id="contactLeadsCount"></p>
          <button type="button" class="btn-admin-ghost btn-admin-sm" data-export="contact">Export CSV</button>
        </div>
      </div>
      <div class="admin-table-wrap" id="contactLeadsTableWrap">
        <p class="admin-empty">Loading…</p>
      </div>
    </section>

    <section class="admin-panel" id="panelVisits">
      <div class="admin-panel-head">
        <h2>Site Visits</h2>
        <p class="admin-panel-sub" id="visitsCount"></p>
      </div>
      <div id="visitsContent">
        <p class="admin-empty">Loading…</p>
      </div>
    </section>

    <section class="admin-panel" id="panelBlogs">
      <div class="admin-panel-head">
        <h2>Blog Posts</h2>
        <button type="button" class="btn-admin-primary" id="newBlogBtn">+ New Post</button>
      </div>
      <div id="blogsListWrap"></div>
      <div id="blogEditorWrap" hidden></div>
    </section>

  </main>
</div>

<div class="admin-modal-overlay" id="leadDetailOverlay" hidden>
  <div class="admin-modal" id="leadDetailModal"></div>
</div>

<script type="module" src="js/admin.js?v=2"></script>
</body>
</html>
